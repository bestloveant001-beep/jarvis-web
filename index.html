<!DOCTYPE html>
<html>
<head>
    <title>[ MARK-V20 ] MULTI-WINDOW HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --iron-cyan: #00d2ff; --iron-glow: rgba(0, 210, 255, 0.3); }
        body { background: #000; color: var(--iron-cyan); font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .desktop { position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #001a2d 0%, #000 100%); }
        .window { position: absolute; border: 1px solid var(--iron-cyan); background: rgba(0, 20, 35, 0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; min-width: 280px; box-shadow: 0 0 15px var(--iron-glow); z-index: 10; }
        .window-header { background: var(--iron-cyan); color: #000; padding: 6px 10px; font-size: 0.65em; font-weight: bold; cursor: move; display: flex; justify-content: space-between; }
        .window-content { padding: 10px; flex: 1; }
        #win-map { top: 10px; left: 10px; width: 300px; height: 220px; }
        #win-ai { top: 240px; left: 10px; width: 320px; height: 280px; }
        #map { width: 100%; height: 100%; filter: hue-rotate(180deg) brightness(0.8); }
        .chat-box { height: 160px; overflow-y: auto; font-size: 0.8em; margin-bottom: 10px; border-bottom: 1px solid var(--iron-glow); }
        .u-msg { color: #fff; opacity: 0.5; margin-bottom: 5px; }
        .j-msg { color: var(--iron-cyan); margin-bottom: 10px; font-weight: bold; }
        .taskbar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); border-top: 1px solid var(--iron-cyan); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .btn { border: 1px solid var(--iron-cyan); padding: 5px 15px; font-size: 0.7em; cursor: pointer; }
        input { width: 100%; background: none; border: 1px solid var(--iron-cyan); color: #fff; padding: 10px; font-family: 'Orbitron'; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="window" id="win-map">
        <div class="window-header" onmousedown="dragWin(this)"><span>SATELLITE_LINK</span><span onclick="toggle('win-map')">X</span></div>
        <div class="window-content" style="padding:0;"><div id="map"></div></div>
    </div>

    <div class="window" id="win-ai">
        <div class="window-header" onmousedown="dragWin(this)"><span>JARVIS_CORE</span><span onclick="toggle('win-ai')">X</span></div>
        <div class="window-content">
            <div id="chat-box" class="chat-box"></div>
            <input type="text" id="cmd" placeholder="ACCESS MAIN_CORE..." onkeypress="if(event.key==='Enter') sendCommand()">
        </div>
    </div>
</div>

<div class="taskbar">
    <div class="btn" onclick="toggle('win-map')">MAP</div>
    <div class="btn" onclick="toggle('win-ai')">AI_CORE</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- 🟢 เชื่อมต่อไฟล์สมองกลแยกส่วน -->
<script src="ai-core.js"></script>

<script>
    let map;
    function toggle(id) { 
        const el = document.getElementById(id); 
        el.style.display = el.style.display === 'none' ? 'flex' : 'none'; 
    }

    async function sendCommand() {
        const input = document.getElementById('cmd');
        const box = document.getElementById('chat-box');
        const msg = input.value;
        if(!msg) return;

        box.innerHTML += `<div class="u-msg">>> ${msg}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        // 🧠 เรียกใช้ฟังก์ชันจากไฟล์ ai-core.js
        const reply = await askJarvis(msg);
        
        box.innerHTML += `<div class="j-msg">JARVIS: ${reply}</div>`;
        box.scrollTop = box.scrollHeight;
        jarvisSpeak(reply);
    }

    function dragWin(header) {
        let win = header.parentElement;
        header.onmousedown = (e) => {
            let x = e.clientX - win.offsetLeft, y = e.clientY - win.offsetTop;
            document.onmousemove = (e) => { win.style.left = (e.clientX-x)+'px'; win.style.top = (e.clientY-y)+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    window.onload = () => {
        navigator.geolocation.getCurrentPosition(p => {
            map = L.map('map', {zoomControl:false}).setView([p.coords.latitude, p.coords.longitude], 15);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        });
    };
</script>
</body>
</html>
