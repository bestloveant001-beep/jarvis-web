<!DOCTYPE html>
<html>
<head>
    <title>[ MARK-V20 ] STARK HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --iron-cyan: #00d2ff; --iron-glow: rgba(0, 210, 255, 0.4); }
        body { background: radial-gradient(circle, #001a2d 0%, #000 100%); color: var(--iron-cyan); font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        .arc-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; height: 80vw; border: 2px solid var(--iron-glow); border-radius: 50%; pointer-events: none; opacity: 0.1; animation: rotate 30s linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .header { border-bottom: 2px solid var(--iron-cyan); padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.7em; letter-spacing: 1px; }
        .hud-main { border: 1px solid var(--iron-glow); background: rgba(0, 30, 50, 0.2); height: 70vh; overflow-y: auto; padding: 15px; position: relative; box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1); scroll-behavior: smooth; }
        .chat-row { margin-bottom: 20px; animation: fadeIn 0.4s; border-left: 2px solid var(--iron-cyan); padding-left: 10px; }
        .u-msg { color: #fff; font-size: 0.8em; opacity: 0.6; margin-bottom: 5px; }
        .j-msg { color: var(--iron-cyan); font-size: 1em; font-weight: bold; line-height: 1.4; }
        .footer { margin-top: 15px; display: flex; gap: 8px; }
        input { flex: 1; background: rgba(0, 210, 255, 0.05); border: 1px solid var(--iron-cyan); padding: 12px; color: var(--iron-cyan); font-family: 'Orbitron'; outline: none; }
        button { background: var(--iron-cyan); border: none; padding: 0 20px; font-weight: bold; cursor: pointer; color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="arc-bg"></div>
    <div class="header">
        <div>MARK-V20 // JS_CORE: ACTIVE</div>
        <div id="clock">00:00:00</div>
        <div>PILOT: SOMDET_S</div>
    </div>
    <div class="hud-main" id="chat-box"></div>
    <div class="footer">
        <input type="text" id="cmd" placeholder="ACCESSING MAIN_CORE..." autocomplete="off">
        <button onclick="sendCommand()">EXE</button>
    </div>

    <script>
        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'th-TH'; utter.pitch = 0.8; utter.rate = 1.0;
            window.speechSynthesis.speak(utter);
        }

        async function getSensors() {
            let s = { battery: "Unknown", lat: "0", lon: "0", time: new Date().toLocaleTimeString() };
            try {
                if(navigator.getBattery) {
                    const b = await navigator.getBattery();
                    s.battery = Math.round(b.level * 100) + "%";
                }
            } catch(e) {}
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (p) => { s.lat = p.coords.latitude.toFixed(4); resolve(s); },
                    () => resolve(s), { timeout: 2000 }
                );
            });
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const history = await res.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = history.map(h => `
                <div class="chat-row">
                    <div class="u-msg">PILOT: ${h.u}</div>
                    <div class="j-msg">JARVIS: ${h.j}</div>
                </div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendCommand() {
            const input = document.getElementById('cmd');
            const msg = input.value;
            if(!msg) return;
            const sensorData = await getSensors();
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, device: sensorData })
            });
            const data = await res.json();
            await loadHistory();
            speak(data.reply);
            input.value = "";
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { loadHistory(); speak("ระบบ มาร์ค วี ยี่สิบ ออนไลน์แล้วครับ ท่านสมเดช"); };
    </script>
</body>
</html>
