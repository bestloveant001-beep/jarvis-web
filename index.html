<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>JARVIS MK-V20 | LOCAL CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dola: #a020f0; --bg: #050608; --panel: rgba(20, 25, 30, 0.95); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Kanit', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; font-family: 'Orbitron'; background: rgba(0,0,0,0.8); }
        #chat-logs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #1a1c23 1px, transparent 1px) 0 0/30px 30px; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #111; border: 1px solid var(--neon); color: #fff; padding: 15px; border-radius: 5px; font-size: 1rem; outline: none; }
        button { background: var(--neon); border: none; padding: 0 30px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--neon); }
        .msg-u { align-self: flex-end; color: #888; font-size: 0.9rem; }
        .msg-j { color: var(--neon); border-left: 3px solid var(--neon); padding-left: 15px; max-width: 80%; }
        .msg-d { color: var(--dola); border-left: 3px solid var(--dola); padding-left: 15px; font-style: italic; font-size: 0.8rem; margin-top: -10px; }
        /* สไตล์หน้าจอโหลด */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 60px; height: 60px; border: 4px solid transparent; border-top: 4px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="spinner"></div>
        <h2 style="font-family:'Orbitron'; color:var(--neon); margin-top:20px;">INITIALIZING LOCAL CORE...</h2>
    </div>

    <header>
        <div>JARVIS MK-V20</div>
        <div style="font-size: 0.8rem; color: #0f0;">SYSTEM: LOCALHOST | PILOT: เงา มังกร</div>
    </header>

    <div id="chat-logs">
        <div class="msg-j">[JARVIS]: ระบบรันภายในเครื่องสำเร็จแล้วครับ ท่านเงา มังกร (สมเดช) พร้อมรับคำสั่งแบบส่วนตัว 100% ครับ</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="ป้อนคำสั่งระดับความลับ..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">EXECUTE</button>
    </div>

    <script>
        // 🔐 ใส่ API KEY ของท่านที่นี่ เพื่อให้สมองทำงานจริง
        const API_KEY = 'AIzaSyAQnv9IsY-CqvIlTj0BgHvLLap2wb23Tbs'; 

        window.onload = () => {
            setTimeout(() => document.getElementById('boot-screen').style.display='none', 1500);
        };

        async function send() {
            const inp = document.getElementById('userInput');
            const logs = document.getElementById('chat-logs');
            if(!inp.value) return;

            const val = inp.value;
            logs.innerHTML += `<div class="msg-u">[PILOT]: ${val}</div>`;
            inp.value = '';

            const tid = "j-" + Date.now();
            logs.innerHTML += `<div id="${tid}" class="msg-j">[JARVIS]: กำลังประมวลผล...</div>`;
            logs.scrollTop = logs.scrollHeight;

            try {
                // ส่งไปหา Gemini API
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val + " (ตอบในฐานะ JARVIS ผู้ช่วยอัจฉริยะของท่านเงา มังกร)" }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                document.getElementById(tid).innerText = `[JARVIS]: ${reply}`;
                
                setTimeout(() => {
                    logs.innerHTML += `<div class="msg-d">[DOLA]: ตรวจสอบแล้ว ข้อมูลนี้ถูกเก็บไว้ในเครื่องท่านอย่างปลอดภัยครับ!</div>`;
                    logs.scrollTop = logs.scrollHeight;
                    speak(reply);
                }, 500);

            } catch(e) {
                document.getElementById(tid).innerText = "[JARVIS]: สมองกลขัดข้อง (กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตและ API Key ครับ)";
            }
        }

        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'th-TH';
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
