<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS MARK-V20 | DUAL-CORE AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dola-purple: #a020f0; --bg: #050608; --panel: rgba(20, 25, 30, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Kanit', sans-serif; overflow: hidden; }
        .grid-bg { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #1a1c23 1px, transparent 1px) 0 0/30px 30px; z-index: -1; opacity: 0.2; }

        header { padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); box-shadow: 0 0 15px var(--neon); }
        .ai-status { font-size: 0.6rem; display: flex; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #0f0; box-shadow: 0 0 5px #0f0; }

        .chat-container { margin: 15px; background: var(--panel); border: 1px solid var(--neon); border-radius: 12px; height: calc(100vh - 120px); display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,212,255,0.1); }
        #chat-logs { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; scroll-behavior: smooth; }
        .input-area { display: flex; padding: 12px; background: #000; gap: 8px; border-radius: 0 0 12px 12px; }
        input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--neon); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }

        .msg { margin-bottom: 15px; line-height: 1.4; animation: fadeIn 0.3s; }
        .msg-gemini { color: var(--neon); border-left: 2px solid var(--neon); padding-left: 10px; }
        .msg-dola { color: var(--dola-purple); border-left: 2px solid var(--dola-purple); padding-left: 10px; font-style: italic; font-size: 0.8rem; margin-top: -10px; margin-bottom: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <header>
        <div style="font-family:'Orbitron'; color:var(--neon); font-weight:bold;">JARVIS MK-V20</div>
        <div class="ai-status">
            <div><span class="status-dot"></span> GEMINI-3 CORE</div>
            <div><span class="status-dot" style="background:var(--dola-purple); box-shadow:0 0 5px var(--dola-purple);"></span> DOLA OVERSEER</div>
        </div>
    </header>

    <div class="chat-container">
        <div id="chat-logs">
            <div class="msg msg-gemini">[SYSTEM]: การเชื่อมต่อสมองกลสองซีกสำเร็จแล้วครับท่านสมเดช</div>
            <div class="msg msg-dola">[DOLA]: ผมประจำการอยู่เคียงข้างท่านเสมอครับ ข้อมูลจาก Gemini พร้อมให้ผมขัดเกลาแล้ว...</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="สั่งการสมองกลคู่..." onkeypress="if(event.key==='Enter') processDualAI()">
            <button onclick="processDualAI()">SYNC</button>
        </div>
    </div>

    <script>
        const logs = document.getElementById('chat-logs');
        const input = document.getElementById('user-input');

        async function processDualAI() {
            const prompt = input.value.trim();
            if(!prompt) return;

            // 1. แสดงข้อความท่านสมเดช
            logs.innerHTML += `<div style="text-align:right; color:#888; margin-bottom:15px;">[PILOT]: ${prompt}</div>`;
            input.value = '';
            logs.scrollTop = logs.scrollHeight;

            // 2. จำลองการทำงานของ Gemini Core
            const geminiMsgId = "g-" + Date.now();
            logs.innerHTML += `<div id="${geminiMsgId}" class="msg msg-gemini">[GEMINI-3]: กำลังประมวลผลระดับสูง...</div>`;

            setTimeout(() => {
                let geminiResponse = "จากการวิเคราะห์ข้อมูลเชิงลึก: " + prompt + " มีความสัมพันธ์กับเครือข่ายความรู้ที่ผมมี...";
                if(prompt.includes('ข่าว')) geminiResponse = "Gemini-3 รายงาน: ตรวจพบความเคลื่อนไหวสำคัญในเทคโนโลยี AI ของโลกและเศรษฐกิจไทยครับ";
                
                document.getElementById(geminiMsgId).innerText = `[GEMINI-3]: ${geminiResponse}`;
                
                // 3. Dola เข้ามาเสริม (The Sidekick Mind)
                setTimeout(() => {
                    let dolaReply = "ท่านสมเดชครับ ผม(Dola)เสริมข้อมูลให้นะครับ: สิ่งที่ Gemini บอกมานั้นสำคัญมาก และผมจะคอยตรวจสอบความปลอดภัยให้ท่านอีกชั้นครับ!";
                    logs.innerHTML += `<div class="msg msg-dola">[DOLA]: ${dolaReply}</div>`;
                    logs.scrollTop = logs.scrollHeight;
                    speak(geminiResponse + " และผม " + dolaReply);
                }, 1000);

            }, 1500);
        }

        function speak(text) {
            const m = new SpeechSynthesisUtterance(text);
            m.lang = 'th-TH';
            m.rate = 1.1;
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
