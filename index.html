<!DOCTYPE html>
<html>
<head>
    <title>[ MARK-V20 ] GITHUB HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --iron-cyan: #00d2ff; --iron-glow: rgba(0, 210, 255, 0.4); }
        body { background: radial-gradient(circle, #001a2d 0%, #000 100%); color: var(--iron-cyan); font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        .arc-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; height: 80vw; border: 2px solid var(--iron-glow); border-radius: 50%; pointer-events: none; opacity: 0.1; animation: rotate 30s linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .header { border-bottom: 2px solid var(--iron-cyan); padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.7em; }
        .hud-main { border: 1px solid var(--iron-glow); background: rgba(0, 30, 50, 0.2); height: 70vh; overflow-y: auto; padding: 15px; position: relative; scroll-behavior: smooth; }
        .chat-row { margin-bottom: 20px; border-left: 2px solid var(--iron-cyan); padding-left: 10px; animation: fadeIn 0.4s; }
        .u-msg { color: #fff; font-size: 0.8em; opacity: 0.6; }
        .j-msg { color: var(--iron-cyan); font-size: 1em; font-weight: bold; margin-top: 5px; }
        .footer { margin-top: 15px; display: flex; gap: 8px; }
        input { flex: 1; background: rgba(0, 210, 255, 0.05); border: 1px solid var(--iron-cyan); padding: 12px; color: var(--iron-cyan); font-family: 'Orbitron'; outline: none; }
        button { background: var(--iron-cyan); border: none; padding: 0 20px; font-weight: bold; cursor: pointer; color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="arc-bg"></div>
    <div class="header">
        <div>MARK-V20 // LOCAL_CORE: ACTIVE</div>
        <div id="clock">00:00:00</div>
        <div>PILOT: SOMDET_S</div>
    </div>
    <div class="hud-main" id="chat-box"></div>
    <div class="footer">
        <input type="text" id="cmd" placeholder="SYSTEM ONLINE..." autocomplete="off">
        <button onclick="sendCommand()">EXE</button>
    </div>

    <script>
        // 🧠 สมองจำลองของจาร์วิส (รันบนเครื่องท่านโดยตรง)
        function jarvisBrain(input, battery) {
            const ui = input.toLowerCase();
            if (ui.includes("สวัสดี") || ui.includes("ไง")) return `สวัสดีครับท่านสมเดช ระบบออนไลน์แล้ว แบตเตอรี่เครื่องท่านคือ ${battery} จาร์วิสสแตนด์บายครับ`;
            if (ui.includes("สถานะ") || ui.includes("พลังงาน")) return `รายงานสถานะ: พลังงานอุปกรณ์อยู่ที่ ${battery} ระบบประมวลผลเสถียรครับ`;
            if (ui.includes("ขอบคุณ")) return "ด้วยความยินดีครับท่าน";
            return `รับทราบครับท่านสมเดช คำสั่ง '${input}' กำลังถูกประมวลผลผ่านโลคอลคอร์ครับ`;
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'th-TH'; utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }

        async function sendCommand() {
            const input = document.getElementById('cmd');
            if(!input.value) return;

            // ดึงแบตเตอรี่จริง
            let battery = "Unknown";
            try { const b = await navigator.getBattery(); battery = Math.round(b.level * 100) + "%"; } catch(e) {}

            const reply = jarvisBrain(input.value, battery);
            
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-row"><div class="u-msg">PILOT: ${input.value}</div><div class="j-msg">JARVIS: ${reply}</div></div>`;
            box.scrollTop = box.scrollHeight;
            
            speak(reply);
            input.value = "";
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { speak("ระบบ มาร์ค วี ยี่สิบ ออนไลน์แล้วครับ ท่านสมเดช"); };
    </script>
</body>
</html>
