<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS MARK-V20 | SIR SOMDET COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d4ff;
            --bg-dark: #0a0b0e;
            --card-bg: rgba(20, 22, 28, 0.9);
            --accent-red: #ff4b2b;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a1c23 0%, #0a0b0e 100%);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--primary-glow);
            padding-bottom: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-glow);
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        .status-bar {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary-glow);
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--primary-glow);
            border-left: 4px solid var(--primary-glow);
            padding-left: 10px;
            margin-top: 0;
        }

        .card.disaster { border-color: var(--accent-red); }
        .card.disaster h2 { color: var(--accent-red); border-left-color: var(--accent-red); }

        .news-item {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .source-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 11px;
            opacity: 0.7;
        }

        .source-link:hover { opacity: 1; text-decoration: underline; }

        .jarvis-input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid var(--primary-glow);
            color: white;
            border-radius: 5px;
            font-family: 'Kanit', sans-serif;
            margin-top: 30px;
        }

        .btn-scan {
            background: var(--primary-glow);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>JARVIS MARK-V20</h1>
    <div class="status-bar">SYSTEM STATUS: OPTIMAL | LOCATION: THAILAND SECTOR | AUTH: SIR SOMDET</div>
</div>

<div class="grid-container">
    <!-- ข่าว 6 หมวด + 2 ระบบพิเศษ -->
    <div class="card"><h2>🚩 ข่าวด่วน</h2><div id="breaking">กำลังเชื่อมต่อดาวเทียม...</div></div>
    <div class="card"><h2>⚖️ การเมือง</h2><div id="politics">...</div></div>
    <div class="card"><h2>💰 เศรษฐกิจ</h2><div id="economy">...</div></div>
    <div class="card"><h2>📈 ตลาดหุ้น</h2><div id="stocks">...</div></div>
    <div class="card"><h2>⚽ กีฬา</h2><div id="sports">...</div></div>
    <div class="card"><h2>➕ ข่าวเสริม</h2><div id="additional">...</div></div>
    <div class="card"><h2>🛰️ ระบบดาวเทียม</h2><div id="satellite">...</div></div>
    <div class="card disaster"><h2>🚨 ภัยพิบัติ</h2><div id="disaster">สแกนพิกัดรอยเลื่อน...</div></div>
</div>

<input type="text" class="jarvis_input" placeholder="สั่งการจาร์วิส... (เช่น สรุปข่าวทองคำ)">
<button class="btn-scan">INITIATE GLOBAL SCAN</button>

</body>
</html>
