<script>
    // 🧠 คลังข้อมูลข่าวกรองสำหรับแต่ละหมวด (จำลองการดึงจาก Server จริง)
    const intelDB = {
        'ข่าวการเมือง': '🚨 [การเมือง] สภาฯ เตรียมพิจารณาร่างกฎหมายใหม่เพื่อกระตุ้นเศรษฐกิจดิจิทัลในเขตประเทศไทยครับ',
        'ข่าวเศรษฐกิจ': '💰 [เศรษฐกิจ] ค่าเงินบาทแข็งค่าขึ้นเล็กน้อย ส่งผลดีต่อผู้นำเข้าสินค้าไอทีในสัปดาห์นี้ครับ',
        'ข่าวกีฬา': '⚽ [กีฬา] ทีมชาติไทยเตรียมลงสนามนัดอุ่นเครื่อง ผลงานล่าสุดถือว่าอยู่ในเกณฑ์ยอดเยี่ยมครับ',
        'ข่าวตลาดหุ้น': '📈 [หุ้น] SET Index ปิดบวกเล็กน้อย กลุ่มพลังงานและธนาคารยังคงเป็นผู้นำตลาดครับ',
        'ข่าวด่วน': '🔥 [ด่วน] กรมอุตุฯ แจ้งเตือนพายุฤดูร้อนในหลายพื้นที่ของภาคเหนือและกลาง เฝ้าระวังกลุ่มฝนครับ',
        'ข่าวเสริม': '➕ [พิเศษ] นวัตกรรม AI ใหม่เริ่มถูกนำมาใช้ในภาคเกษตรกรรมของไทย เพื่อเพิ่มผลผลิตครับ'
    };

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }, 2000);
    };

    function login() {
        if(document.getElementById('pass').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            speak("ระบบออนไลน์แล้วครับท่านสมเดช");
        } else { alert("ACCESS DENIED"); }
    }

    function runAI(topic) {
        document.getElementById('user-input').value = topic;
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const logs = document.getElementById('chat-logs');
        if(!input.value) return;

        const val = input.value;
        logs.innerHTML += `<div style="text-align:right; margin-bottom:15px; font-size:0.8rem; color:#888;">[PILOT]: ${val}</div>`;
        input.value = '';
        logs.scrollTop = logs.scrollHeight;

        const gemId = "g-" + Date.now();
        logs.innerHTML += `<div id="${gemId}" class="msg-jarvis">[GEMINI-3]: กำลังวิเคราะห์ข้อมูล...</div>`;

        setTimeout(() => {
            // 📡 ดึงข้อมูลที่ตรงกับหมวดหมู่
            let gemReply = intelDB[val] || "ข้าน้อยกำลังรวบรวมข้อมูลเชิงลึกเกี่ยวกับ '" + val + "' ให้ท่านสมเดชครับ";
            document.getElementById(gemId).innerText = `[GEMINI-3]: ${gemReply}`;

            setTimeout(() => {
                let dolaReply = "ผม(Dola)เสริมข้อมูลให้นะครับ: สถานการณ์นี้ท่านสมเดชควรจับตาดูเป็นพิเศษ ผมจะเฝ้าระวังให้เองครับ!";
                logs.innerHTML += `<div class="msg-dola">[DOLA]: ${dolaReply}</div>`;
                logs.scrollTop = logs.scrollHeight;
                speak(gemReply + " " + dolaReply);
            }, 800);
        }, 1200);
    }

    function speak(text) {
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'th-TH';
        window.speechSynthesis.speak(m);
    }

    setInterval(() => {
        const locs = ["กรุงเทพฯ", "เชียงใหม่", "ภูเก็ต", "ชลบุรี"];
        document.getElementById('sat').innerText = `LIVE: ${locs[Math.floor(Math.random()*locs.length)]} SECTOR CLEAR`;
    }, 5000);
</script>
