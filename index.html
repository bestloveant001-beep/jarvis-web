<!DOCTYPE html>
<html>
<head>
    <title>[ MARK-V20 ] MOBILE HUD ELITE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --iron-cyan: #00d2ff; --iron-glow: rgba(0, 210, 255, 0.4); --warning: #ff3c3c; }
        body { background: #000; color: var(--iron-cyan); font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        /* HUD Layout */
        .hud-container { display: flex; flex-direction: column; height: 100%; padding: 10px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; font-size: 0.55em; border-bottom: 1px solid var(--iron-glow); padding-bottom: 5px; }
        
        /* Mobile Sensors Bar */
        .sensor-bar { display: flex; justify-content: space-around; background: rgba(0, 210, 255, 0.1); padding: 5px; font-size: 0.5em; margin: 5px 0; border: 1px solid var(--iron-glow); }
        .critical { color: var(--warning); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #map { height: 18vh; border: 1px solid var(--iron-cyan); opacity: 0.8; filter: hue-rotate(180deg) brightness(0.7); }

        .chat-box { flex: 1; overflow-y: auto; border: 1px solid var(--iron-glow); margin: 10px 0; padding: 10px; background: rgba(0, 30, 50, 0.2); font-size: 0.85em; }
        .j-msg { color: var(--iron-cyan); margin-bottom: 10px; border-left: 2px solid var(--iron-cyan); padding-left: 5px; }
        .u-msg { color: #fff; opacity: 0.6; font-size: 0.8em; margin-bottom: 5px; }

        .controls { display: flex; gap: 5px; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; background: #001a2d; border: 1px solid var(--iron-cyan); color: var(--iron-cyan); padding: 15px; font-family: 'Orbitron'; font-size: 16px; border-radius: 5px; }
        button { background: var(--iron-cyan); border: none; padding: 0 20px; color: #000; font-weight: bold; border-radius: 5px; }

        /* Animation Background */
        .scanner-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--iron-glow); box-shadow: 0 0 10px var(--iron-cyan); animation: scan 4s linear infinite; pointer-events: none; z-index: 100; }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }
    </style>
</head>
<body>
    <div class="scanner-line"></div>
    <div class="hud-container">
        <div class="header">
            <span>MARK-V20 // MOBILE_LINK</span>
            <span id="clock">00:00:00</span>
            <span>PILOT: SOMDET_S</span>
        </div>

        <div class="sensor-bar">
            <span id="bat-val">BAT: --%</span>
            <span id="net-val">NET: --</span>
            <span id="tilt-val">GYRO: STABLE</span>
        </div>

        <div id="map"></div>

        <div class="chat-box" id="chat-box">
            <div class="j-msg">JARVIS: ระบบเคลื่อนที่พร้อมใช้งานแล้วครับท่านสมเดช ทุกเซ็นเซอร์ออนไลน์</div>
        </div>

        <div class="controls">
            <input type="text" id="cmd" placeholder="COMMAND..." autocomplete="off">
            <button onclick="sendCommand()">EXE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = "AIzaSyDNG91SpfOI2qeHBnhveV1zOUjxEbRoakQ"; // API Key เดิมของท่าน
        let map, marker;

        // 📳 ระบบสั่น (Vibration)
        function haptic() { if(navigator.vibrate) navigator.vibrate(40); }

        // 🔋 ระบบตรวจสอบแบตเตอรี่
        async function updateBattery() {
            try {
                const b = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(b.level * 100);
                    const el = document.getElementById('bat-val');
                    el.innerText = `BAT: ${level}%`;
                    if(level < 20) el.classList.add('critical'); else el.classList.remove('critical');
                };
                b.addEventListener('levelchange', update);
                update();
            } catch(e) {}
        }

        // 🌐 ระบบตรวจสอบเน็ตเวิร์ก
        function updateNetwork() {
            const net = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if(net) {
                document.getElementById('net-val').innerText = `NET: ${net.effectiveType.toUpperCase()}`;
            }
        }

        // 📐 ระบบ Gyroscope (เอียงเครื่อง)
        window.addEventListener('deviceorientation', (e) => {
            const tilt = Math.abs(e.beta) + Math.abs(e.gamma);
            document.getElementById('tilt-val').innerText = tilt > 40 ? "GYRO: UNSTABLE" : "GYRO: STABLE";
        });

        function initMap(lat, lon) {
            if (!map) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([lat, lon], 15);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
                marker = L.circleMarker([lat, lon], { color: '#00d2ff', radius: 10 }).addTo(map);
            } else { map.setView([lat, lon]); marker.setLatLng([lat, lon]); }
        }

        async function sendCommand() {
            haptic();
            const input = document.getElementById('cmd');
            const msg = input.value;
            if(!msg) return;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude.toFixed(4);
                const lon = pos.coords.longitude.toFixed(4);
                initMap(lat, lon);

                // ส่งคำสั่งไปที่ AI
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="u-msg">>> ${msg}</div>`;
                
                try {
                    const prompt = `คุณคือ JARVIS ในชุดเกราะ MARK-V20 ตอบท่านสมเดชสั้นๆ เท่ๆ: ${msg}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    
                    box.innerHTML += `<div class="j-msg">JARVIS: ${reply}</div>`;
                    const utter = new SpeechSynthesisUtterance(reply);
                    utter.lang = 'th-TH'; window.speechSynthesis.speak(utter);
                } catch(e) {
                    box.innerHTML += `<div class="j-msg">JARVIS: ขออภัยครับ ระบบเชื่อมต่อสมองกลขัดข้อง</div>`;
                }
                
                box.scrollTop = box.scrollHeight;
                input.value = "";
            });
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => {
            updateBattery();
            updateNetwork();
            navigator.geolocation.getCurrentPosition(p => initMap(p.coords.latitude, p.coords.longitude));
        };
    </script>
</body>
</html>
